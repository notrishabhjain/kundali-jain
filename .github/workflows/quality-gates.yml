name: quality-gates

on:
  pull_request:
  push:
    branches: [ main, work ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Hindi guard
        run: npm run check:hindi

      - name: Pancham Kaal doctrinal guard
        run: npm run check:pancham

      - name: Karma quality guard
        run: npm run check:karma

      - name: PDF parity guard
        run: npm run check:pdfparity

      - name: Build
        run: npm run build
