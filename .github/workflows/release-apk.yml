name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Create local.properties
      working-directory: ./android
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Accept Android SDK Licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build Release APK
      working-directory: ./android
      run: gradle assembleRelease --no-daemon --stacktrace

    - name: Rename APK
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        cp android/app/build/outputs/apk/release/app-release-unsigned.apk JainKundali-${VERSION}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "Jain Kundali ${{ github.ref_name }}"
        body: |
          ## जैन कुंडली Android App ${{ github.ref_name }}
          
          ### Download
          Download the APK file below and install it on your Android device.
          
          ### Features
          - Kundali Generation (100% offline)
          - PDF Export & Share
          - Jaap Counter (108-bead mala with vibration)
          - Meditation Timer with streak tracking
          - Jain Mantras & Stotras database (purely Jain)
          - 300 Indian cities for birth location
          - Profile management
          - Dark mode with Vedic theme
          
          ### Installation
          1. Download the APK file
          2. Transfer to your Android phone (if needed)
          3. Enable "Install from unknown sources" in Settings
          4. Open the APK to install
        files: JainKundali-*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
